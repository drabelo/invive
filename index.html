<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invive — Fast Sites for Real Businesses</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0D0D0F;
      --bg2:      #111316;
      --surface:  #181B1F;
      --border:   rgba(255,255,255,.08);
      --teal:     #4FFFD4;
      --teal-dim: rgba(79,255,212,.12);
      --white:    #FFFFFF;
      --text:     rgba(255,255,255,.88);
      --muted:    rgba(255,255,255,.52);
      --radius:   14px;
      --radius-lg: 22px;
      --shadow:   0 4px 24px rgba(0,0,0,.3);
      --shadow-lg:0 16px 48px rgba(0,0,0,.5);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    .section    { padding: 100px 0; }

    /* ── NAV ── */
    #nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 18px 0;
      transition: background .3s, backdrop-filter .3s, box-shadow .3s;
    }
    #nav.scrolled {
      background: rgba(13,13,15,.8);
      backdrop-filter: blur(20px);
      box-shadow: 0 1px 0 var(--border);
    }
    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--white);
      text-decoration: none;
      letter-spacing: -.02em;
    }
    .nav-logo span { color: var(--teal); }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }
    .nav-links a {
      text-decoration: none;
      font-size: .88rem;
      font-weight: 500;
      color: var(--muted);
      transition: color .2s;
    }
    .nav-links a:hover { color: var(--white); }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 24px;
      border-radius: 100px;
      font-weight: 600;
      font-size: .88rem;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: transform .2s, box-shadow .2s, background .2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    .btn-primary { background: var(--teal); color: var(--bg); }
    .btn-ghost   { background: transparent; color: var(--white); border: 1.5px solid var(--border); }
    .btn-ghost:hover { border-color: rgba(255,255,255,.25); background: rgba(255,255,255,.04); }

    /* ── SCROLL REVEAL ── */
    .reveal { opacity: 0; transform: translateY(28px); transition: opacity .55s ease, transform .55s ease; }
    .reveal.visible { opacity: 1; transform: none; }
    .reveal-delay-1 { transition-delay: .1s; }
    .reveal-delay-2 { transition-delay: .2s; }
    .reveal-delay-3 { transition-delay: .3s; }

    /* ── HERO ── */
    #hero {
      min-height: 100svh;
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
      background: var(--bg);
    }
    .hero-glow {
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(79,255,212,.07) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -60%);
      pointer-events: none;
    }
    .hero-content {
      text-align: center;
      position: relative;
      z-index: 1;
      padding: 140px 24px 80px;
      max-width: 820px;
    }
    .hero-eyebrow {
      display: inline-block;
      font-size: .75rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 24px;
    }
    .hero-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.6rem, 6vw, 5rem);
      font-weight: 800;
      line-height: 1.08;
      letter-spacing: -.03em;
      color: var(--white);
      margin-bottom: 24px;
    }
    .hero-sub {
      font-size: clamp(1rem, 1.8vw, 1.15rem);
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 40px;
    }
    .hero-actions { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    .hero-rule {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .section { padding: 72px 0; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>

  <nav id="nav">
    <div class="container nav-inner">
      <a href="#hero" class="nav-logo">inv<span>i</span>ve</a>
      <ul class="nav-links">
        <li><a href="#work">Work</a></li>
        <li><a href="#pricing">Pricing</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#contact" class="btn btn-primary">Get in Touch</a></li>
      </ul>
    </div>
  </nav>

  <!-- HERO -->
  <section id="hero">
    <div class="hero-glow"></div>
    <div class="hero-content reveal">
      <span class="hero-eyebrow">Web Design & Development</span>
      <h1 class="hero-title">Your business deserves a site that works as hard as you do.</h1>
      <p class="hero-sub">Fast turnaround. Fixed pricing. No jargon.<br>Professional websites for small businesses — built and live in 2 weeks.</p>
      <div class="hero-actions">
        <a href="#pricing" class="btn btn-primary">See Pricing</a>
        <a href="#work" class="btn btn-ghost">View Work</a>
      </div>
    </div>
    <div class="hero-rule"></div>
  </section>

  <!-- sections go here -->

  <script>
    // Nav scroll
    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 40);
    });

    // Scroll reveal
    const reveals = document.querySelectorAll('.reveal');
    const observer = new IntersectionObserver(
      entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
      { threshold: 0.05, rootMargin: '0px 0px -40px 0px' }
    );
    reveals.forEach(el => observer.observe(el));
    setTimeout(() => reveals.forEach(el => el.classList.add('visible')), 1200);
  </script>
</body>
</html>
